<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANTIN SAYANG</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe4e1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        #app-container {
            background-color: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .btn-mulai {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-mulai:hover {
            background-color: #ff69b4;
            transform: scale(1.05);
        }
        .struk {
            border: 2px dashed #e81313;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
            background-color: #ffe4e1;
        }

    </style>
</head>
<body>

    <div id="app-container">
      <h1 style="color: #ff69b4;">💕 Kantin Sayang 💕</h1>
      <p id="pesan-awal">Siap jajan hari ini bidadariku?</p>
      <div id="display-area">
        <button class="btn-mulai" onclick="mulaiJajan()">Klik Disini Sayang</button>
      </div>
    
    </div>
    <script src="main.js"></script>

</body>

</html>
